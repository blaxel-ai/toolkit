name: Integration Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "cli/**"
      - "sdk/**"
      - "test/integration/**"
      - "main.go"

concurrency:
  group: integration-tests-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    environment: integration-tests
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run integration tests
        env:
          BL_API_KEY: ${{ secrets.BL_API_KEY }}
          BL_WORKSPACE: ${{ secrets.BL_WORKSPACE }}
        run: |
          chmod +x test/integration/get.sh
          bash test/integration/get.sh
